<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Guessing Game</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script> 
</head>
<body>
    <main class="container">
        <p class="mess">I am thinking of a number between 1-100</p>
        <p class="hint">Can you guess it?</p>
        <input type="number" id="guessInput" placeholder="NUM">
        <button id="guessButton">GUESS</button>
        <p id="message1">No. of Guesses: 0</p>
        <p id="message2">Guessed numbers are: None</p>
        <p id="message3" id="feedback"></p>
    </main>
</body>
</html>
